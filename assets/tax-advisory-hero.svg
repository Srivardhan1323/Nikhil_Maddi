<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
    <linearGradient id="chart" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#D97706" flood-opacity="0.12"/>
    </filter>
    <style>
      .float1 { animation: floatB 3s ease-in-out infinite; }
      .float2 { animation: floatB 3.5s ease-in-out infinite 0.5s; }
      .float3 { animation: floatB 4s ease-in-out infinite 1s; }
      .float4 { animation: floatB 3.2s ease-in-out infinite 1.5s; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      @keyframes floatB {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="520" height="400" rx="24" fill="url(#bg)"/>

  <!-- Main advisory card -->
  <g class="float1">
    <rect x="120" y="80" width="280" height="240" rx="18" fill="white" filter="url(#shadow)"/>
    <!-- Header -->
    <rect x="120" y="80" width="280" height="48" rx="18" fill="#D97706"/>
    <rect x="120" y="108" width="280" height="20" fill="#D97706"/>
    <text x="260" y="108" text-anchor="middle" font-size="9.5" fill="white" font-family="sans-serif" font-weight="bold">TAX ADVISORY PLAN</text>
    <!-- Advisor icon -->
    <circle cx="155" cy="104" r="14" fill="#FDE68A"/>
    <rect x="145" y="112" width="20" height="22" rx="6" fill="#92400E"/>

    <!-- Growth chart area -->
    <path d="M 148 230 L 195 210 L 240 220 L 285 178 L 330 160 L 375 140" stroke="#F59E0B" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 148 230 L 195 210 L 240 220 L 285 178 L 330 160 L 375 140 L 375 290 L 148 290 Z" fill="url(#chart)"/>
    <!-- Data points -->
    <circle cx="195" cy="210" r="5" fill="#F59E0B"/>
    <circle cx="240" cy="220" r="5" fill="#F59E0B"/>
    <circle cx="285" cy="178" r="5" fill="#F59E0B"/>
    <circle cx="330" cy="160" r="5" fill="#F59E0B"/>
    <circle cx="375" cy="140" r="7" fill="#D97706"/>

    <!-- Axis -->
    <line x1="148" y1="290" x2="380" y2="290" stroke="#FDE68A" stroke-width="1.5"/>
    <line x1="148" y1="145" x2="148" y2="290" stroke="#FDE68A" stroke-width="1.5"/>

    <!-- Percentage badge -->
    <rect x="342" y="120" width="52" height="28" rx="8" fill="#ECFDF5"/>
    <text x="368" y="132" text-anchor="middle" font-size="7.5" fill="#16A34A" font-family="sans-serif">Savings</text>
    <text x="368" y="143" text-anchor="middle" font-size="9" fill="#16A34A" font-family="sans-serif" font-weight="bold">+32%</text>

    <!-- Strategy items -->
    <rect x="148" y="162" width="86" height="18" rx="6" fill="#FEF3C7"/>
    <text x="191" y="174" text-anchor="middle" font-size="7" fill="#92400E" font-family="sans-serif">Income Tax Plan</text>
    <rect x="148" y="184" width="76" height="18" rx="6" fill="#FEF3C7"/>
    <text x="186" y="196" text-anchor="middle" font-size="7" fill="#92400E" font-family="sans-serif">GST Advisory</text>
  </g>

  <!-- Lightbulb float -->
  <g class="float2" transform="translate(60, 80)">
    <circle cx="36" cy="36" r="36" fill="#F59E0B" filter="url(#shadow)"/>
    <text x="36" y="47" text-anchor="middle" font-size="28" font-family="sans-serif">💡</text>
  </g>

  <!-- Shield badge -->
  <g class="float3" transform="translate(400, 85)">
    <circle cx="36" cy="36" r="36" fill="#D97706" filter="url(#shadow)"/>
    <!-- Shield shape -->
    <path d="M36 18 L52 24 L52 38 Q52 50 36 57 Q20 50 20 38 L20 24 Z" fill="white" opacity="0.9"/>
    <polyline points="29,37 34,42 43,31" stroke="#D97706" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Pie chart float -->
  <g class="float4" transform="translate(400, 270)">
    <rect width="76" height="76" rx="12" fill="white" filter="url(#shadow)"/>
    <!-- Pie slices -->
    <circle cx="38" cy="44" r="24" fill="#FDE68A"/>
    <path d="M38 44 L38 20 A24 24 0 0 1 58 56 Z" fill="#F59E0B"/>
    <path d="M38 44 L58 56 A24 24 0 0 1 22 62 Z" fill="#D97706"/>
    <text x="38" y="14" text-anchor="middle" font-size="7.5" fill="#92400E" font-family="sans-serif" font-weight="bold">Tax Mix</text>
  </g>

  <!-- GST document -->
  <g class="float1" transform="translate(52, 240)">
    <rect width="80" height="64" rx="10" fill="white" filter="url(#shadow)"/>
    <rect width="80" height="18" rx="10" fill="#D97706"/>
    <rect x="0" y="10" width="80" height="8" fill="#D97706"/>
    <text x="40" y="14" text-anchor="middle" font-size="7" fill="white" font-family="sans-serif" font-weight="bold">GST Consulting</text>
    <rect x="10" y="25" width="60" height="4" rx="2" fill="#FEF3C7"/>
    <rect x="10" y="33" width="48" height="4" rx="2" fill="#FEF3C7"/>
    <rect x="10" y="41" width="56" height="4" rx="2" fill="#FEF3C7"/>
    <rect x="10" y="52" width="60" height="7" rx="4" fill="#F59E0B"/>
    <text x="40" y="57.5" text-anchor="middle" font-size="6" fill="white" font-family="sans-serif">View Strategy</text>
  </g>

  <!-- Sparkles -->
  <g class="pulse">
    <circle cx="470" cy="55" r="4" fill="#F59E0B" opacity="0.5"/>
    <circle cx="45" cy="360" r="3" fill="#D97706" opacity="0.4"/>
    <circle cx="500" cy="340" r="5" fill="#16A34A" opacity="0.3"/>
  </g>
</svg>
