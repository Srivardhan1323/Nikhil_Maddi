<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="60" fill="url(#bg)"/>
  <!-- Globe -->
  <circle cx="60" cy="60" r="34" fill="white" opacity="0.9"/>
  <circle cx="60" cy="60" r="34" stroke="#4F46E5" stroke-width="2" fill="none"/>
  <!-- Latitude lines -->
  <ellipse cx="60" cy="60" rx="34" ry="14" stroke="#C7D2FE" stroke-width="1" fill="none"/>
  <line x1="26" y1="60" x2="94" y2="60" stroke="#C7D2FE" stroke-width="1"/>
  <!-- Longitude -->
  <ellipse cx="60" cy="60" rx="20" ry="34" stroke="#C7D2FE" stroke-width="1" fill="none"/>
  <!-- India dot -->
  <circle cx="66" cy="58" r="5" fill="#4F46E5"/>
  <!-- Airplane -->
  <g transform="translate(82,32) rotate(45)">
    <path d="M0 0 L8 4 L0 8 L2 4 Z" fill="#4F46E5"/>
    <path d="M0 4 L-8 8 L-6 4 L-8 0 Z" fill="#818CF8"/>
  </g>
  <!-- Flight path dashed -->
  <path d="M78 42 Q68 50 66 58" stroke="#4F46E5" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>
</svg>
