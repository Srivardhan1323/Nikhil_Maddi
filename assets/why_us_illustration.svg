<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4F46E5" flood-opacity="0.12"/>
    </filter>
    <style>
      .floatA { animation: floatW 3s ease-in-out infinite; }
      .floatB { animation: floatW 3.8s ease-in-out infinite 0.6s; }
      .floatC { animation: floatW 3.4s ease-in-out infinite 1.2s; }
      .pulse  { animation: pulse 2s ease-in-out infinite; }
      @keyframes floatW {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
    </style>
  </defs>
  <rect width="480" height="360" rx="20" fill="url(#bg)"/>

  <!-- Central star/award person -->
  <g class="floatA">
    <circle cx="240" cy="150" r="52" fill="white" filter="url(#shadow)"/>
    <!-- Star ring -->
    <circle cx="240" cy="150" r="52" stroke="#4F46E5" stroke-width="2" fill="none" stroke-dasharray="6 4"/>
    <!-- Person face -->
    <circle cx="240" cy="138" r="26" fill="#FDE68A"/>
    <!-- Body -->
    <rect x="218" y="158" width="44" height="48" rx="12" fill="#4F46E5"/>
    <!-- Tie -->
    <polygon points="240,164 244,170 240,192 236,170" fill="#818CF8"/>
    <!-- Checkmark badge -->
    <circle cx="272" cy="115" r="14" fill="#22C55E"/>
    <polyline points="266,115 271,120 280,109" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Speed / Lightning card -->
  <g class="floatB" transform="translate(60, 80)">
    <rect width="100" height="80" rx="12" fill="white" filter="url(#shadow)"/>
    <circle cx="50" cy="34" r="22" fill="#EEF2FF"/>
    <text x="50" y="42" text-anchor="middle" font-size="22" font-family="sans-serif">⚡</text>
    <rect x="10" y="62" width="80" height="6" rx="3" fill="#C7D2FE"/>
    <rect x="24" y="72" width="52" height="5" rx="2.5" fill="#E0E7FF"/>
  </g>

  <!-- Guidance / Lightbulb card -->
  <g class="floatC" transform="translate(320, 70)">
    <rect width="100" height="80" rx="12" fill="white" filter="url(#shadow)"/>
    <circle cx="50" cy="34" r="22" fill="#FEF9C3"/>
    <text x="50" y="42" text-anchor="middle" font-size="22" font-family="sans-serif">💡</text>
    <rect x="10" y="62" width="80" height="6" rx="3" fill="#FDE68A"/>
    <rect x="24" y="72" width="52" height="5" rx="2.5" fill="#FEF3C7"/>
  </g>

  <!-- Support card -->
  <g class="floatA" transform="translate(55, 230)">
    <rect width="100" height="80" rx="12" fill="white" filter="url(#shadow)"/>
    <circle cx="50" cy="34" r="22" fill="#F0FDF4"/>
    <text x="50" y="42" text-anchor="middle" font-size="22" font-family="sans-serif">🤝</text>
    <rect x="10" y="62" width="80" height="6" rx="3" fill="#DCFCE7"/>
    <rect x="24" y="72" width="52" height="5" rx="2.5" fill="#F0FDF4"/>
  </g>

  <!-- Security card -->
  <g class="floatC" transform="translate(325, 235)">
    <rect width="100" height="80" rx="12" fill="white" filter="url(#shadow)"/>
    <circle cx="50" cy="34" r="22" fill="#EEF2FF"/>
    <!-- Shield -->
    <path d="M50 20 L62 26 L62 36 Q62 44 50 50 Q38 44 38 36 L38 26 Z" fill="#4F46E5"/>
    <polyline points="44,35 49,40 57,30" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="10" y="62" width="80" height="6" rx="3" fill="#C7D2FE"/>
    <rect x="24" y="72" width="52" height="5" rx="2.5" fill="#E0E7FF"/>
  </g>

  <!-- Stars / sparkles -->
  <g class="pulse">
    <circle cx="185" cy="70" r="5" fill="#4F46E5" opacity="0.5"/>
    <circle cx="300" cy="285" r="4" fill="#22C55E" opacity="0.4"/>
    <circle cx="430" cy="170" r="4" fill="#F59E0B" opacity="0.4"/>
    <circle cx="50"  cy="180" r="3" fill="#4F46E5" opacity="0.3"/>
  </g>

  <!-- Connecting dotted lines -->
  <line x1="160" y1="120" x2="192" y2="138" stroke="#818CF8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="320" y1="112" x2="290" y2="132" stroke="#818CF8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="155" y1="270" x2="200" y2="200" stroke="#818CF8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="325" y1="272" x2="282" y2="202" stroke="#818CF8" stroke-width="1.5" stroke-dasharray="4 3"/>
</svg>
